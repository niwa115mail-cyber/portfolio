<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>ロゴ制作</title>
  <meta name="description" content="架空ヨガスタジオのロゴ">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="wrapper">
    <h1>ロゴ制作【illustrator】</h1>
    <div class="content">
      <div class="concept">
        <div class="Lboard">
          <h2>ロゴマーク</h2>
          <img src="img/ロゴ.png" width="300" height="250" alt="ロゴマーク">
          <img src="img/ロゴ-2.png" width="300" height="250" alt="ロゴマーク2">
        </div><!-- /Lbord -->
        <h4>▼ コンセプト</h4>
        <div class="comment">
          <h3>アピールポイント</h3>
          <p>オフィス街にある女性専用少人数制のヨガスタジオのロゴです。リフレッシュやリラックスを目的としていること
            もあり、 コーポレートカラーは周りを茶色or黒にし、ヨガをする人を柔らかいイメージで緑色にしてヨガポーズを
            取り入れてみました。 ロゴマークの名前「Niwa Yoga」はメリハリをつけて少し大きめで目立つようにしました。
            </p>
          <h4>ユーザーターゲット</h4>
          <p>
            オフィス街で働く20代～40代の会社員をターゲットにしてみました。
            </p>
         
        </div>
        <!--/comment-->
      </div><!-- /concept -->
      <div class="MRboard">
        <h3>名刺</h3>
        <img src="img/ロゴ制作/1.5x/card.jpg" width="300" height="250" alt="ロゴマーク1">
        
        
      </div><!-- /MRbord -->
    </div>
    <!-- /content -->
    <footer>
      @adjust academy
    </footer>
    <!--/next-->
  </div>
  <!-- /wrapper -->
</body>

</html>
