          <h2 class="article-title">株式会社SpaceCreationDesign<br>コーポレートサイト</h2>
          <div class="article-body">
            <p>
              <img src="img/fullsize_2.jpg" width="1000" height="913" alt="作品スクリーンショット">
            </p>
            <p>
              インテリアデザイナーが理想的で居心地の良い空間創りをお手伝いするための企業サイトです。<br>（作品について一言）
            </p>
            <h3>URL</h3>
            <p><a href="https://niwa115mail-cyber.github.io/site02/" target="_blank" rel="noopener"><a href="https://niwa115mail-cyber.github.io/site02/></a></p>
            <h3>担当</h3>
            <p>デザイン・コーディング</p>
            <h3>サイトの目的</h3>
            <p>課題制作・就職活動のため</p>
            <h3>ターゲット</h3>
            <p>20代～40代のオフィスやホテルで働く会社員男女</p>
            <h3>デザインについて</h3>
            <p>
              居心地の良い空間づくりがテーマのようになっているので、働く場であっても明るくリラックスできそうな写真を使用しました。<br>企業名やタイトルも黒ではなくブラウンを使用することにより、硬くなりすぎないよう工夫しました。
            <p>
              デザインを担当する企業でもあるので、全体的にシンプルでオシャレな雰囲気を出すために、背景色は薄いベージュのグラデーションカラーを使用し、企業名は目立つようにfooterへは少し濃いカラーを取り入れてみました。

                          </p>
            <h3>コーディングについて</h3>
            <p>
              「Top」ページと「SUSTAINABILITY」で大きな画像を使用し全体的に引き締まったような印象にしてみました。明るい空間づくりのサンプル画像を、少しでも伝えたくてjQueryで動きを出しユーザーの目に留まるように意識してみました。
            </p>
